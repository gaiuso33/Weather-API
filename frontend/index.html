<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Weather App</h1>

    <form id="weatherForm">
      <input type="text" id="locationInput" placeholder="Enter a city..." required />
      <button type="submit">Search</button>
    </form>

    <div class="toggle-box hidden" id="toggleBox">
      <button id="toggleUnit">Switch °C / °F</button>
    </div>

    <div id="loading" class="hidden">Loading...</div>

    <div id="weatherDisplay" class="weather-box hidden"></div>

    <h2 id="forecastTitle" class="hidden">3-Day Forecast</h2>
    <div id="forecastDisplay" class="forecast-container hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
